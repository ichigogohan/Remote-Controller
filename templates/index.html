<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ultimate Remote Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg-dark: #000000; --surface: #121212; --key-surface: #252525;
            --key-main: #2a2a2a; --accent: #007aff; --text-main: #ffffff;
            --text-dim: #888888; --drag-glow: #222222;
        }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--bg-dark); }
        body {
            height: 100dvh; display: flex; flex-direction: column;
            touch-action: none; user-select: none; -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: var(--text-main);
        }

        /* --- Settings Panel (Accordion) --- */
        #settings-panel {
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }
        #settings-panel.open { max-height: 200px; padding: 10px 15px; }
        .setting-item { margin-bottom: 8px; }
        .setting-label { font-size: 10px; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 2px; }
        
        #settings-toggle-btn {
            background: #0a0a0a;
            font-size: 20px;
            color: #555;
            text-align: center;
            padding: 4px 0;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }

        /* --- Trackpad --- */
        #trackpad-container { flex: 1; padding: 6px 10px; display: flex; flex-direction: column; min-height: 80px; }
        #trackpad {
            flex: 1; background-color: var(--surface); border-radius: 12px;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        #cursor { display: none !important; }

        /* --- Mouse Action Panel --- */
        #mouse-action-panel { display: flex; gap: 6px; padding: 0 10px 8px 10px; height: 50px; flex-shrink: 0; }
        .mouse-btn {
            flex: 1; background: var(--key-surface); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: var(--text-dim); transition: all 0.1s;
        }
        .mouse-btn.active { background: var(--accent); color: #fff; }
        
        #scroll-slider-container { width: 50px; background: var(--surface); border-radius: 8px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #scroll-slider-thumb { width: 100%; height: 24px; background: var(--accent); opacity: 0.6; position: absolute; pointer-events: none; top: calc(50% - 12px); }

        /* --- PC Controls (Scrollable) --- */
        #ui-bottom-stack { flex-shrink: 0; display: flex; flex-direction: column; }
        .f-key-container {
            overflow-x: auto; white-space: nowrap; display: flex; gap: 6px;
            padding: 10px 10px; touch-action: pan-x; -webkit-overflow-scrolling: touch;
        }
        .f-key-container::-webkit-scrollbar { display: none; }
        .f-key {
            min-width: 55px; height: 36px; background: var(--key-surface); border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; color: var(--text-dim); flex-shrink: 0;
        }

        .control-row { display: flex; gap: 4px; padding: 0 10px 8px 10px; }
        .mod-key { flex: 1; background: var(--key-surface); height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 11px; font-weight: 600; }
        .mod-key.active { background: var(--accent); color: #fff; }

        /* --- Keyboard --- */
        #mobile-keyboard { background-color: var(--surface); padding: 8px 4px calc(8px + env(safe-area-inset-bottom)) 4px; display: flex; flex-direction: column; gap: 4px; border-radius: 16px 16px 0 0; }
        .kb-row { display: flex; justify-content: center; gap: 3px; }
        .kb-key { background: var(--key-main); flex: 1; height: 42px; display: flex; align-items: center; justify-content: center; border-radius: 5px; font-size: 15px; }
        .kb-key.side { background: #1e1e1e; font-size: 11px; flex: 1.3; }
        .kb-key.space { flex: 4; }
        .kb-key.enter { background: var(--accent); color: white; flex: 2; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div id="settings-panel">
        <div class="grid grid-cols-2 gap-x-6 gap-y-2">
            <div class="setting-item">
                <div class="setting-label"><span>トラックパッド感度</span><span id="val-sensitivity">2.0</span></div>
                <input type="range" id="range-sensitivity" min="0.5" max="10.0" step="0.01" value="2.0" class="w-full">
            </div>
            <div class="setting-item">
                <div class="setting-label"><span>スクロールインターバル</span><span id="val-scroll">25</span>ms</div>
                <input type="range" id="range-scroll" min="5" max="100" step="1" value="25" class="w-full">
            </div>
            <div class="flex items-center gap-2 py-1">
                <input type="checkbox" id="toggle-label" checked>
                <label class="text-[10px] text-gray-400">トラックパッドのラベル表示</label>
            </div>
            <div class="flex items-center gap-2 py-1">
                <input type="checkbox" id="toggle-stream" checked>
                <label class="text-[10px] text-gray-400">ストリーミング画面の表示</label>
            </div>
        </div>
    </div>
    <div id="settings-toggle-btn">設定 ▾</div>

    <div id="trackpad-container">
        <div id="trackpad">
            <img id="stream-bg" src="http://{{ local_ip }}:5002/preview_feed?t={{ token }}" 
                style="position:absolute; width:100%; height:100%; object-fit:contain; opacity:0.9; border-radius:12px; pointer-events:none;">
            <div id="cursor"></div>
            <span class="label-dim" id="mode-label" style="z-index:10; opacity:0.4; font-size:70px">Trackpad</span>
        </div>
    </div>

    <div id="mouse-action-panel">
        <div class="mouse-btn" id="btn-left">LEFT</div>
        <div id="scroll-slider-container">
            <div id="scroll-slider-thumb"></div>
            <span class="text-[8px] text-[#888] uppercase z-10 pointer-events-none">Scroll</span>
        </div>
        <div class="mouse-btn" id="btn-right">RIGHT</div>
    </div>

    <div id="ui-bottom-stack">
        <div id="pc-controls">
            <div class="f-key-container" id="f-scroll-area">
                <div class="f-key" data-key="Esc">Esc</div>
                <div class="f-key" data-key="F1">F1</div><div class="f-key" data-key="F2">F2</div>
                <div class="f-key" data-key="F3">F3</div><div class="f-key" data-key="F4">F4</div>
                <div class="f-key" data-key="F5">F5</div><div class="f-key" data-key="F6">F6</div>
                <div class="f-key" data-key="F7">F7</div><div class="f-key" data-key="F8">F8</div>
                <div class="f-key" data-key="F9">F9</div><div class="f-key" data-key="F10">F10</div>
                <div class="f-key" data-key="F11">F11</div><div class="f-key" data-key="F12">F12</div>
            </div>
            <div class="control-row">
                <div class="mod-key" data-mod="Ctrl">Ctrl</div>
                <div class="mod-key" data-mod="Shift">Shift</div>
                <div class="mod-key" data-mod="Alt">Alt</div>
                <div class="mod-key" data-mod="Win">Win</div>
                <div class="mod-key" data-key="Del">Del</div>
            </div>
        </div>

        <div id="mobile-keyboard">
            <div class="kb-row">
                <div class="kb-key" data-key="1">1</div><div class="kb-key" data-key="2">2</div>
                <div class="kb-key" data-key="3">3</div><div class="kb-key" data-key="4">4</div>
                <div class="kb-key" data-key="5">5</div><div class="kb-key" data-key="6">6</div>
                <div class="kb-key" data-key="7">7</div><div class="kb-key" data-key="8">8</div>
                <div class="kb-key" data-key="9">9</div><div class="kb-key" data-key="0">0</div>
            </div>
            <div class="kb-row">
                <div class="kb-key" data-key="Q">Q</div><div class="kb-key" data-key="W">W</div>
                <div class="kb-key" data-key="E">E</div><div class="kb-key" data-key="R">R</div>
                <div class="kb-key" data-key="T">T</div><div class="kb-key" data-key="Y">Y</div>
                <div class="kb-key" data-key="U">U</div><div class="kb-key" data-key="I">I</div>
                <div class="kb-key" data-key="O">O</div><div class="kb-key" data-key="P">P</div>
            </div>
            <div class="kb-row">
                <div class="kb-key" data-key="A">A</div><div class="kb-key" data-key="S">S</div>
                <div class="kb-key" data-key="D">D</div><div class="kb-key" data-key="F">F</div>
                <div class="kb-key" data-key="G">G</div><div class="kb-key" data-key="H">H</div>
                <div class="kb-key" data-key="J">J</div><div class="kb-key" data-key="K">K</div>
                <div class="kb-key" data-key="L">L</div>
            </div>
            <div class="kb-row">
                <div class="kb-key side" data-key="Tab">Tab</div>
                <div class="kb-key" data-key="Z">Z</div><div class="kb-key" data-key="X">X</div>
                <div class="kb-key" data-key="C">C</div><div class="kb-key" data-key="V">V</div>
                <div class="kb-key" data-key="B">B</div><div class="kb-key" data-key="N">N</div>
                <div class="kb-key" data-key="M">M</div>
                <div class="kb-key side" data-key="BS">BS</div>
            </div>
            <div class="kb-row">
                <div class="kb-key side" data-key="zenkakuhankaku">あ/A</div>
                <div class="kb-key space" data-key="Space">Space</div>
                <div class="kb-key enter" data-key="Enter">Enter</div>
            </div>
        </div>
    </div>

    <script>
        const socket = io({ auth: { token: "{{ token }}" } });
        const trackpad = document.getElementById('trackpad');
        const cursor = document.getElementById('cursor');
        const scrollContainer = document.getElementById('scroll-slider-container');
        const scrollThumb = document.getElementById('scroll-slider-thumb');
        const streamBg = document.getElementById('stream-bg');
        const modeLabel = document.getElementById('mode-label');

        // --- 状態管理・設定値 ---
        let activePadTouchId = null;
        let lastX = 0, lastY = 0;
        let cursorX = 0, cursorY = 0;
        let activeMods = new Set();
        let scrollInterval = null;

        // 設定変数のデフォルト値
        let config = {
            sensitivity: 2.0,
            scrollIntervalMs: 25,
            showLabel: true,
            showStream: true
        };

        // --- LocalStorage から読み込み ---
        const loadSettings = () => {
            const saved = localStorage.getItem('remote_config');
            if (saved) {
                config = { ...config, ...JSON.parse(saved) };
            }
            // UIに反映
            document.getElementById('range-sensitivity').value = config.sensitivity;
            document.getElementById('val-sensitivity').innerText = config.sensitivity;
            document.getElementById('range-scroll').value = config.scrollIntervalMs;
            document.getElementById('val-scroll').innerText = config.scrollIntervalMs;
            document.getElementById('toggle-label').checked = config.showLabel;
            document.getElementById('toggle-stream').checked = config.showStream;
            
            modeLabel.style.display = config.showLabel ? 'block' : 'none';
            streamBg.style.visibility = config.showStream ? 'visible' : 'hidden';
        };

        const saveSettings = () => {
            localStorage.setItem('remote_config', JSON.stringify(config));
        };

        // --- 設定パネルのイベント ---
        document.getElementById('settings-toggle-btn').addEventListener('click', () => {
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('open');
            document.getElementById('settings-toggle-btn').innerText = panel.classList.contains('open') ? '設定 ▴' : '設定 ▾';
        });

        document.getElementById('range-sensitivity').addEventListener('input', (e) => {
            config.sensitivity = parseFloat(e.target.value);
            document.getElementById('val-sensitivity').innerText = config.sensitivity;
            saveSettings();
        });

        document.getElementById('range-scroll').addEventListener('input', (e) => {
            config.scrollIntervalMs = parseInt(e.target.value);
            document.getElementById('val-scroll').innerText = config.scrollIntervalMs;
            saveSettings();
        });

        document.getElementById('toggle-label').addEventListener('change', (e) => {
            config.showLabel = e.target.checked;
            modeLabel.style.display = config.showLabel ? 'block' : 'none';
            saveSettings();
        });

        document.getElementById('toggle-stream').addEventListener('change', (e) => {
            config.showStream = e.target.checked;
            streamBg.style.visibility = config.showStream ? 'visible' : 'hidden';
            saveSettings();
        });

        // --- トラックパッド (Identifier識別) ---
        trackpad.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (activePadTouchId === null) {
                    activePadTouchId = touch.identifier;
                    lastX = touch.clientX; lastY = touch.clientY;
                    if (cursorX === 0) {
                        const rect = trackpad.getBoundingClientRect();
                        cursorX = rect.width / 2; cursorY = rect.height / 2;
                    }
                }
            }
        }, { passive: false });

        trackpad.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.touches.length; i++) {
                const touch = e.touches[i];
                if (touch.identifier === activePadTouchId) {
                    const dx = touch.clientX - lastX;
                    const dy = touch.clientY - lastY;
                    
                    socket.emit('mouse_move', { 
                        x: dx * config.sensitivity, 
                        y: dy * config.sensitivity 
                    });

                    const rect = trackpad.getBoundingClientRect();
                    cursorX = Math.max(0, Math.min(rect.width - 10, cursorX + dx));
                    cursorY = Math.max(0, Math.min(rect.height - 10, cursorY + dy));
                    cursor.style.left = `${cursorX}px`; cursor.style.top = `${cursorY}px`;
                    lastX = touch.clientX; lastY = touch.clientY;
                }
            }
        }, { passive: false });

        trackpad.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === activePadTouchId) {
                    activePadTouchId = null;
                }
            }
        }, { passive: false });

        // --- マウスボタン ---
        const setupMouseBtn = (id, buttonName) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => {
                e.preventDefault();
                socket.emit('mouse_down', { button: buttonName });
                el.classList.add('active');
                if (navigator.vibrate) navigator.vibrate(30);
            }, { passive: false });
            el.addEventListener('touchend', (e) => {
                e.preventDefault();
                socket.emit('mouse_up', { button: buttonName });
                el.classList.remove('active');
            }, { passive: false });
        };
        setupMouseBtn('btn-left', 'left');
        setupMouseBtn('btn-right', 'right');

        // --- オートスクロール ---
        const handleScrollMove = (touchY) => {
            const rect = scrollContainer.getBoundingClientRect();
            const centerY = rect.top + rect.height / 2;
            const offset = touchY - centerY;
            let thumbPos = touchY - rect.top - 12;
            thumbPos = Math.max(0, Math.min(rect.height - 24, thumbPos));
            scrollThumb.style.top = `${thumbPos}px`;

            if (Math.abs(offset) > rect.height * 0.15) {
                const speed = offset > 0 ? -15 : 15;
                if (!scrollInterval) {
                    scrollInterval = setInterval(() => {
                        socket.emit('mouse_wheel', { dy: speed });
                    }, config.scrollIntervalMs); 
                }
            } else {
                if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
            }
        };
        scrollContainer.addEventListener('touchstart', (e) => handleScrollMove(e.touches[0].clientY), { passive: false });
        scrollContainer.addEventListener('touchmove', (e) => { e.preventDefault(); handleScrollMove(e.touches[0].clientY); }, { passive: false });
        scrollContainer.addEventListener('touchend', () => {
            if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; }
            scrollThumb.style.top = "calc(50% - 12px)";
        }, { passive: false });

        // --- キーボード & ファンクションキー ---
        let touchStartX = 0, touchStartY = 0, isScrollingAction = false;

        const bindKeyEvents = (elements) => {
            elements.forEach(el => {
                el.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                    isScrollingAction = false;
                }, { passive: true });

                el.addEventListener('touchmove', (e) => {
                    const dx = Math.abs(e.touches[0].clientX - touchStartX);
                    const dy = Math.abs(e.touches[0].clientY - touchStartY);
                    if (dx > 10 || dy > 10) isScrollingAction = true;
                }, { passive: true });

                el.addEventListener('touchend', (e) => {
                    if (!isScrollingAction) {
                        e.preventDefault();
                        const key = el.dataset.key;
                        const mod = el.dataset.mod;
                        if (mod) {
                            if (activeMods.has(mod)) { activeMods.delete(mod); el.classList.remove('active'); }
                            else { activeMods.add(mod); el.classList.add('active'); }
                        } else if (key) {
                            if (navigator.vibrate) navigator.vibrate(10);
                            socket.emit('key_event', { key: key, mods: Array.from(activeMods) });
                        }
                    }
                }, { passive: false });
            });
        };

        bindKeyEvents(document.querySelectorAll('.f-key, .kb-key, .mod-key'));

        window.addEventListener('load', () => {
            document.body.style.height = `${window.innerHeight}px`;
            loadSettings();
        });
    </script>
</body>
</html>
